environment: local

server:
  grpc_port: ":50051"
  http_port: ":8080"

db:
  host: localhost
  port: 5432
  ssl_mode: disable

redis:
  addr: localhost:6380
  db: 0
  ttl:
    sms_code_verification: 5m
    profile: 15m
    auth_block: 5m
    code: 5m
    email_verification: 15m

auth:
  otp:
    code_length: 6
    attempts: 5
    cooldown: 60s
    daily_per_phone: 5
    daily_per_ip: 20
  access_token_ttl: 15m
  refresh_token_ttl: 168h

minio:
  endpoint: "localhost:9000"
  bucket: "hairdress-avatars"
  use_ssl: false

log:
  level: debug

smtp:
  host: "smtp.yandex.ru"
  port: 587