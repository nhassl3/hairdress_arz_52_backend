<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Салон красоты | Почта</title>
</head>

<body style="
margin:0;
padding:0;
background:#E2E8F0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
">

<table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
        <td align="center">

            <table width="640" cellpadding="0" cellspacing="0" border="0"
                   style="max-width:640px;">

                <!-- Header -->
                <tr>
                    <td align="center"
                        style="
        background:#1E293B;
        padding:36px;
        border-radius:24px 24px 0 0;
        ">

            <span style="
            font-size:40px;
            font-weight:800;
            color:#E2E8F0;
            ">Салон</span><span style="
            font-size:40px;
            font-weight:800;
            color:#38BDF8;
            ">Красоты
            </span>

                    </td>
                </tr>

                <!-- Body -->
                <tr>
                    <td style="
        background:#7DD3FC;
        padding:50px;
        ">
                        {{template "content" .}}
                    </td>
                </tr>

                <!-- Footer -->
                <tr>
                    <td align="center"
                        style="
        background:#1E293B;
        padding:28px;
        border-radius:0 0 24px 24px;
        ">

                        <div style="
            color:#BAE6FD;
            font-size:13px;
            line-height:24px;
            ">
                            Если вы не запрашивали никаких кодов,
                            просто проигнорируйте это письмо.
                            <br><br>
                            © 2026 Парикмахерская г. Арзамас
                        </div>

                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
